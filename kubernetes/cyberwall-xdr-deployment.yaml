apiVersion: v1
kind: Namespace
metadata:
  name: cyberwall-xdr

---
# ─── ConfigMap for Environment Configs ──────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: xdr-config
  namespace: cyberwall-xdr
data:
  NODE_ENV: "production"
  MONGO_URI: "mongodb://mongodb-service:27017/cyberwall_xdr"
  REDIS_URL: "redis://redis-service:6379"
  AUTH_SERVICE_URL: "http://auth-service:5001"
  THREAT_SERVICE_URL: "http://threat-service:5002"
  WEBSOCKET_SERVICE_URL: "http://websocket-service:5003"
  JWT_SECRET: "supersecretcyberwallxdrkey12345"

---
# ─── MongoDB Storage Volume ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: cyberwall-xdr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ─── MongoDB Service & Deployment ──────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: cyberwall-xdr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
# ─── Redis Service & Deployment ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cyberwall-xdr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
# ─── Auth Service ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 5001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cyberwall-xdr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: cyberwall-auth-service:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: xdr-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5

---
# ─── Threat & Analytics Service ───────────────────────
apiVersion: v1
kind: Service
metadata:
  name: threat-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 5002
  selector:
    app: threat-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-service
  namespace: cyberwall-xdr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threat-service
  template:
    metadata:
      labels:
        app: threat-service
    spec:
      containers:
        - name: threat-service
          image: cyberwall-threat-service:latest
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: xdr-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 5

---
# ─── WebSocket Service ────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 5003
  selector:
    app: websocket-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
  namespace: cyberwall-xdr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service
  template:
    metadata:
      labels:
        app: websocket-service
    spec:
      containers:
        - name: websocket-service
          image: cyberwall-websocket-service:latest
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: xdr-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5

---
# ─── API Gateway ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: cyberwall-xdr
spec:
  ports:
    - port: 5000
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cyberwall-xdr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: cyberwall-gateway:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: xdr-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

---
# ─── Ingress Routing (Nginx) ──────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xdr-ingress
  namespace: cyberwall-xdr
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/websocket-services: "websocket-service"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: websocket-service
                port:
                  number: 5003
