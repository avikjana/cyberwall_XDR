version: '3.8'

services:
  # Database store
  mongodb:
    image: mongo:6.0
    container_name: cyberwall_mongodb
    command: mongod --wiredTigerCacheSizeGB 0.5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - xdr_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Express REST & WebSocket API backend
  backend:
    build: ../backend
    container_name: cyberwall_backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/cyberwall_xdr
      - JWT_SECRET=supersecretcyberwallxdrkey12345
      - JWT_REFRESH_SECRET=supersecretrefreshcyberwallxdrkey54321
      - JWT_EXPIRE=1h
      - JWT_REFRESH_EXPIRE=7d
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - xdr_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.request({ host: 'localhost', port: 5000, path: '/health', timeout: 2000 }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => { process.exit(1); }); req.end();"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # React Client Build container
  frontend:
    build: ../frontend
    container_name: cyberwall_frontend
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - xdr_net

  # Nginx Gateway reverse proxy
  proxy:
    build: ../nginx
    container_name: cyberwall_proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - xdr_net

  # Python firewall & packet capture IDS/IPS engine
  firewall-engine:
    build: ../firewall-engine
    container_name: cyberwall_firewall_engine
    privileged: true
    network_mode: "host" # Needs host NIC access to capture packets
    environment:
      - BACKEND_URL=http://localhost:5000
      - API_KEY=cyberwall-xdr-engine-secret-token
      - NETWORK_INTERFACE=
    depends_on:
      backend:
        condition: service_healthy
    # Fallback restart if backend is booting
    restart: on-failure

volumes:
  mongo_data:

networks:
  xdr_net:
    driver: bridge
